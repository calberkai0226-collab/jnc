<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="巨能场 - 用 AI 驱动自动化，让业务全自动运转。不需要代码，也能拥有企业级 AI 解决方案。智能客服、流程自动化、数据分析一站搞定。" />
<title>巨能场 — 读懂你的业务，再让它全自动运转</title>
<style>

  :root {
    --bg-primary: #f5f3ee;
    --bg-secondary: #ede9e1;
    --bg-card: rgba(107, 44, 201, 0.04);
    --bg-card-hover: rgba(107, 44, 201, 0.07);
    --border-subtle: rgba(65, 19, 130, 0.1);
    --border-medium: rgba(65, 19, 130, 0.2);
    --text-primary: #1a1118;
    --text-secondary: rgba(26, 17, 24, 0.65);
    --text-tertiary: rgba(26, 17, 24, 0.4);
    --accent-purple-deep: #411382;
    --accent-purple: #6B2CC9;
    --accent-purple-light: #8E5BE8;
    --accent-cyan: #3BCFEF;
    --accent-pink: #D946EF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
  body {
    font-family: inherit;
    font-weight: 400;
    font-synthesis: none;
    -webkit-text-size-adjust: 100%;
    color: var(--text-primary);
    background: var(--bg-primary);
    line-height: 1.5;
    letter-spacing: -0.01em;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-synthesis: none; }
  h1, h2, h3, h4, h5, h6, p, span, a, li, div { font-synthesis: none; }

  /* Navigation */
  /* ── 顶部完整导航栏（页面最顶端时显示） ── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: 76px;
    background: transparent;
    border-bottom: none;
    overflow: hidden;
    pointer-events: none;
    display: none;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .nav.nav-collapsed {
    pointer-events: none;
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border-bottom-color: transparent;
  }
  .nav.nav-collapsed .nav-links {
    opacity: 0;
  }
  .nav-inner {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
  }

  /* ── BCG 式：左 logo 浮块 + 右汉堡浮块 ── */
  /* 导航、菜单、Footer 样式由 shared.js 统一注入 */

  /* 原 logo / nav-links（在完整导航栏里） */
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 19px; font-weight: 500;
    letter-spacing: 0.02em;
    color: rgba(42, 31, 61, 0.82);
    transition: color 0.3s;
    border-radius: 10px;
    text-decoration: none;
    overflow: hidden;
  }
  .logo-inner {
    display: flex; align-items: center; gap: 7px;
    background: transparent;
    border-radius: 9px;
    padding: 5px 14px 5px 6px;
    transform: translateY(8px);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  /* 向下滚动：logo向上滑出 */
  .nav.logo-hidden .logo-inner {
    transform: translateY(-110%);
  }
  /* 向上滚回：logo从下方滑入（先瞬移到下方，再过渡到0） */
  .nav.logo-enter-from-bottom .logo-inner {
    transform: translateY(110%);
    transition: none;
  }
  .logo-full { height: 40px; width: auto; display: block; filter: brightness(0) invert(1) opacity(0.92); }
  .nav-links { display: flex; gap: 36px; }
  .nav-links a {
    font-size: 14px;
    color: rgba(255, 252, 248, 0.88);
    transition: color 0.2s;
    font-weight: 500;
  }
  .nav-links a:hover { color: #ffffff; }
  .nav.scrolled .nav-links a { color: rgba(26, 17, 24, 0.75); }
  .nav.scrolled .nav-links a:hover { color: var(--text-primary); }
  .nav.scrolled .logo { color: var(--text-primary); }
  .nav.scrolled .logo-full { filter: brightness(0) opacity(0.82); }

  /* 手机端导航栏内汉堡按钮（桌面端隐藏） */
  .nav-mobile-menu {
    display: none;
    flex-direction: column; gap: 6px;
    align-items: center; justify-content: center;
    width: 44px; height: 44px;
    cursor: pointer; background: none; border: none; padding: 0;
  }
  .nav-mobile-menu span {
    display: block; width: 26px; height: 2px;
    background: rgba(255, 252, 248, 0.88);
    border-radius: 2px;
    transform-origin: center;
    transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1),
                opacity 0.25s ease,
                background 0.3s ease;
  }
  .nav.scrolled .nav-mobile-menu span {
    background: var(--text-primary);
  }
  /* 菜单打开时导航栏隐藏，所以这里不需要X状态 */

  /* ≤640px 手机端 - 仅页面专属样式 */
  @media (max-width: 640px) {
    .nav-inner { padding: 0 20px; }
    .nav-links { display: none; }
    .nav-mobile-menu { display: flex; }
    .logo-full { height: 32px; }
    .logo-inner { margin-left: -3px; transform: translateY(6px); }
    .nav { height: 74px; }
  }

  /* Hero */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 140px 32px 100px;
    text-align: center;
    overflow: hidden;
    isolation: isolate;
    background: #0e0618;
  }

  /* ---------- 视频背景 ---------- */
  .hero-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;        /* 视频铺满容器，不变形 */
    object-position: center;
    z-index: -3;              /* 最底层 */
    background: #0e0618;
  }

  /* 视频上方的暗色遮罩：保证文字可读 */
  .hero-video-mask {
    position: absolute;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    /* 多层叠加遮罩：上下有暗角、整体加深 */
    background:
      linear-gradient(180deg,
        rgba(0, 0, 0, 0.35) 0%,
        rgba(0, 0, 0, 0.1) 40%,
        rgba(0, 0, 0, 0.1) 60%,
        rgba(0, 0, 0, 0.55) 100%),
      radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.35) 100%);
  }
  .hero-aurora {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: -2;            /* 在视频之上，遮罩之下 */
    overflow: hidden;
    transition: opacity 0.8s ease;
  }
  /* 当视频真正在播放时，光斑淡化到 30%（作为"装饰层"而不是主角） */
  .hero.has-video .hero-aurora { opacity: 0.3; }
  .aurora-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    will-change: transform;
  }
  .aurora-blob-1 {
    width: 600px; height: 600px;
    background: var(--accent-purple);
    top: -15%; left: -10%;
    opacity: 0.55;
    animation: auroraFloat1 22s ease-in-out infinite;
  }
  .aurora-blob-2 {
    width: 520px; height: 520px;
    background: var(--accent-cyan);
    top: 25%; right: -10%;
    opacity: 0.45;
    animation: auroraFloat2 26s ease-in-out infinite;
  }
  .aurora-blob-3 {
    width: 480px; height: 480px;
    background: var(--accent-purple-deep);
    bottom: -20%; left: 20%;
    opacity: 0.65;
    animation: auroraFloat3 30s ease-in-out infinite;
  }
  .aurora-blob-4 {
    width: 380px; height: 380px;
    background: var(--accent-pink);
    top: 10%; left: 45%;
    opacity: 0.3;
    animation: auroraFloat4 24s ease-in-out infinite;
  }
  .aurora-blob-5 {
    width: 340px; height: 340px;
    background: var(--accent-purple-light);
    bottom: 20%; right: 30%;
    opacity: 0.4;
    animation: auroraFloat5 28s ease-in-out infinite;
  }
  @keyframes auroraFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(160px, 100px) scale(1.2); }
    66%      { transform: translate(80px, 200px) scale(0.9); }
  }
  @keyframes auroraFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(-180px, 120px) scale(1.3); }
  }
  @keyframes auroraFloat3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    40%      { transform: translate(-120px, -80px) scale(1.15); }
    75%      { transform: translate(100px, -160px) scale(0.95); }
  }
  @keyframes auroraFloat4 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(140px, -100px) scale(1.4); }
  }
  @keyframes auroraFloat5 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(-100px, 80px) scale(1.2); }
    66%      { transform: translate(-60px, -120px) scale(0.9); }
  }

  .hero-title, .hero-subtitle, .hero-ctas { position: relative; z-index: 1; }
  .hero-title {
    font-size: clamp(36px, 6vw, 80px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 0.98;
    margin-bottom: 32px;
    max-width: 1100px;
    color: #ffffff;
    opacity: 0; transform: translateY(30px);
    animation: fadeUp 1s ease-out 0.1s forwards;
  }
  .hero-subtitle {
    font-size: clamp(18px, 2vw, 22px);
    font-weight: 400;
    color: rgba(255, 255, 255, 0.8);
    max-width: 640px;
    margin-bottom: 48px;
    line-height: 1.5;
    opacity: 0; transform: translateY(30px);
    animation: fadeUp 1s ease-out 0.3s forwards;
  }
  .hero-ctas {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    opacity: 0; transform: translateY(30px);
    animation: fadeUp 1s ease-out 0.5s forwards;
  }
  .btn-primary, .btn-secondary {
    font-size: 15px; font-weight: 500;
    padding: 14px 28px;
    border-radius: 100px;
    transition: all 0.25s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent-purple); color: #ffffff; }
  .btn-primary:hover { background: var(--accent-purple-deep); transform: translateY(-1px); }
  .btn-secondary {
    background: transparent; color: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.35);
  }
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.6);
  }
  .btn-primary::after, .btn-secondary::after {
    content: '→'; transition: transform 0.25s;
  }
  .btn-primary:hover::after, .btn-secondary:hover::after { transform: translateX(3px); }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  /* Section base */
  section { padding: 140px 32px; position: relative; }
  .section-inner { max-width: 1080px; margin: 0 auto; }
  .section-header { text-align: center; margin-bottom: 80px; }
  .section-eyebrow {
    display: inline-block;
    font-size: 12px; font-weight: 500;
    color: var(--accent-purple-light);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 6px 14px;
    border: 1px solid var(--border-medium);
    border-radius: 100px;
    background: rgba(107, 44, 201, 0.04);
  }
  .section-title {
    font-size: clamp(36px, 5.5vw, 64px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 20px;
    color: var(--text-primary);
  }
  .section-subtitle {
    font-size: clamp(17px, 1.6vw, 19px);
    color: var(--text-secondary);
    max-width: 680px; margin: 0 auto;
    line-height: 1.6;
  }

  /* Value prop */
  .value-prop {
    padding: 140px 32px; text-align: center;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(107, 44, 201, 0.1) 0%, transparent 60%),
      var(--bg-primary);
    border-top: 1px solid var(--border-subtle);
    border-bottom: 1px solid var(--border-subtle);
  }

  /* ========== 理念板块（滑动） ========== */
  .principles {
    padding: 140px 32px 120px;
    overflow: hidden;
    background: var(--bg-primary);
  }
  .principles-header {
    text-align: center;
    margin-bottom: 64px;
    max-width: 1080px;
    margin-left: auto; margin-right: auto;
  }

  /* 外层容器：控制视口 */
  .principles-viewport {
    max-width: 1280px;
    margin: 0 auto;
    overflow: hidden;
    cursor: grab;
  }
  .principles-viewport:active { cursor: grabbing; }

  /* 内层轨道：4 张卡片横向排列 */
  .principles-track {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 0 32px;
    transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
    will-change: transform;
  }

  .principle-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 24px;
    padding: 40px 32px;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.4s, background 0.4s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .principle-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 0%, rgba(107, 44, 201, 0.1), transparent 60%);
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  /* 当前激活的卡片（仅在窄屏或需要提示时才会被加上 active 类） */
  .principle-card.active {
    border-color: var(--border-medium);
    background: var(--bg-card-hover);
  }
  .principle-card.active::before { opacity: 1; }

  .principle-num {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent-purple-light);
    letter-spacing: 0.15em;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .principle-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 14px;
    color: var(--text-primary);
    position: relative;
    z-index: 1;
  }
  .principle-desc {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  /* ========== 进度条（4 段颠跌式，Apple iPhone 同款） ========== */
  .principles-progress {
    display: flex;
    gap: 8px;
    max-width: 400px;
    margin: 48px auto 0;
    padding: 0 32px;
  }
  .progress-segment {
    flex: 1;
    height: 2px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
  .progress-segment::after {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 100%;
    background: var(--text-primary);
    border-radius: 2px;
    transform: scaleX(0);
    transform-origin: left;
  }
  /* 已过去的段：满填充 */
  .progress-segment.filled::after { transform: scaleX(1); }
  /* 当前正在走的段 */
  .progress-segment.active::after {
    transform: scaleX(1);
    animation: fillProgress var(--fill-duration, 5s) linear forwards;
  }
  @keyframes fillProgress {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  /* 宽屏：进度条不显示（4 张都静止展示，没必要） */
  @media (min-width: 1025px) {
    .principles-progress { display: none; }
  }

  /* 窄屏：轨道变成横向单张滚动 */
  @media (max-width: 1024px) {
    .principles-viewport {
      overflow: visible;
    }
    .principles-track {
      grid-template-columns: repeat(4, 85%);
      gap: 16px;
      padding: 0 32px;
    }
    .principle-card {
      min-height: 240px;
      padding: 36px 28px;
    }
    .principle-title { font-size: 22px; }
  }

  @media (max-width: 640px) {
    .principles { padding: 100px 0 80px; }
    .principles-track {
      grid-template-columns: repeat(4, 88%);
      gap: 12px;
      padding: 0 20px;
    }
    .principle-card {
      min-height: 220px;
      padding: 32px 24px;
    }
    .principle-title { font-size: 20px; }
  }

  /* Services */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px; margin-top: 64px;
  }
  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 24px;
    padding: 40px 32px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative; overflow: hidden;
    will-change: transform;
  }
  .service-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at var(--mx, 50%) var(--my, 0%), rgba(107, 44, 201, 0.1), transparent 60%);
    opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  .service-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-medium);
    transform: translateY(-4px);
  }
  .service-card:hover::before { opacity: 1; }
  .service-icon {
    width: 48px; height: 48px;
    background: var(--accent-purple);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    position: relative; z-index: 1;
  }
  .service-icon svg { width: 24px; height: 24px; stroke: #ffffff; fill: none; stroke-width: 1.8; }
  .service-title {
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.01em; margin-bottom: 10px;
    color: var(--text-primary); position: relative; z-index: 1;
  }
  .service-desc {
    font-size: 15px; color: var(--text-secondary);
    line-height: 1.6; position: relative; z-index: 1;
  }

  /* Process */
  .process { background: var(--bg-secondary); }
  .process-steps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 48px; margin-top: 64px;
  }
  .step {
    text-align: left; padding-top: 24px;
    border-top: 1px solid var(--border-medium);
  }
  .step-num {
    font-size: 12px; font-weight: 500;
    color: var(--accent-purple-light);
    letter-spacing: 0.15em; margin-bottom: 14px;
  }
  .step-title {
    font-size: 20px; font-weight: 700;
    letter-spacing: -0.01em; margin-bottom: 10px;
    color: var(--text-primary);
  }
  .step-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  /* Contact */
  .contact {
    text-align: center;
    background:
      radial-gradient(ellipse at 50% 100%, rgba(59, 207, 239, 0.08) 0%, transparent 60%),
      var(--bg-primary);
  }
  .contact-form { max-width: 560px; margin: 64px auto 0; text-align: left; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-field { margin-bottom: 14px; }
  .form-field label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text-tertiary); margin-bottom: 8px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .form-field input, .form-field textarea, .form-field select {
    width: 100%; padding: 14px 16px;
    font-size: 15px; font-family: inherit;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 12px; color: var(--text-primary);
    transition: all 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  .form-field input::placeholder, .form-field textarea::placeholder {
    color: var(--text-tertiary);
  }
  .form-field input:focus, .form-field textarea:focus, .form-field select:focus {
    outline: none;
    border-color: var(--accent-purple-light);
    background: var(--bg-card-hover);
    box-shadow: 0 0 0 4px rgba(142, 91, 232, 0.15);
  }
  .form-field textarea { resize: vertical; min-height: 120px; }
  .form-field select { cursor: pointer; }
  .form-field select option { background: #ede9e1; color: var(--text-primary); }
  .form-submit {
    width: 100%;
    background: var(--accent-purple); color: #ffffff;
    padding: 16px; font-size: 15px; font-weight: 500;
    border-radius: 100px; transition: all 0.2s; margin-top: 12px;
  }
  .form-submit:hover { background: var(--accent-purple-deep); transform: translateY(-1px); }
  @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } }

  /* Footer 和 Toast 样式由 shared.js 统一注入 */

  /* Scroll reveal */
  .reveal {
    opacity: 0; transform: translateY(40px);
    transition: opacity 1s ease-out, transform 1s ease-out;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }



  /* 手机端降级 */
  @media (max-width: 640px) {
    .aurora-blob-4, .aurora-blob-5 { display: none; }
    .aurora-blob { filter: blur(70px); }
    .aurora-blob-1 { width: 340px; height: 340px; }
    .aurora-blob-2 { width: 300px; height: 300px; }
    .aurora-blob-3 { width: 280px; height: 280px; }
    section { padding: 100px 20px; }
    .hero { padding: 120px 20px 80px; }
    .hero-title {
      line-height: 1.35;
      letter-spacing: 0.04em;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .aurora-blob { animation: none; }
  }
</style>
</head>
<body>


<!-- Hero -->
<section class="hero">

  <!-- ==================== 视频背景层 ==================== -->
  <!-- 未来替换视频：把 src 改成你的视频文件路径即可
       视频要求：
       · 格式 MP4（H.264 编码兼容性最好）
       · 分辨率 1920×1080 以上
       · 时长 8-20 秒，循环无缝
       · 文件大小建议 <10MB（超过要压缩）
       · 视频主体偏暗，避免文字看不清 -->
  <video
    class="hero-video"
    autoplay
    muted
    loop
    playsinline
    webkit-playsinline
    preload="auto"
    x5-video-player-type="h5"
    x5-video-player-fullscreen="false"
    aria-hidden="true">
    <!-- 替换成你的视频文件：把 hero.mp4 放进仓库根目录（和 index.html 同一层）即可 -->
    <source src="hero.mp4" type="video/mp4" />
  </video>

  <!-- 视频上方的暗色渐变遮罩（保证文字清晰，即使视频再花哨） -->
  <div class="hero-video-mask" aria-hidden="true"></div>

  <!-- 视频兜底：如果视频没加载或不存在，显示流动光斑 -->
  <div class="hero-aurora" aria-hidden="true">
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="aurora-blob aurora-blob-3"></div>
    <div class="aurora-blob aurora-blob-4"></div>
    <div class="aurora-blob aurora-blob-5"></div>
  </div>

  <!-- Hero 文案 -->
  <h1 class="hero-title">读懂你的业务，<br/>再让它全自动运转。</h1>
</section>

<!-- ========== 理念板块（宽屏静止 4 张，窄屏滑动 + 进度条） ========== -->
<section class="principles">
  <div class="principles-header reveal">
    <div class="section-eyebrow">我们的理念</div>
    <h2 class="section-title">四件事，<br/>我们和别人不一样。</h2>
  </div>

  <div class="principles-viewport" id="principlesViewport">
    <div class="principles-track" id="principlesTrack">
      <div class="principle-card" data-index="0">
        <div class="principle-num">01</div>
        <div class="principle-title">不做咨询,<br/>直接下场</div>
        <div class="principle-desc">不写厚报告,我们和你的团队一起把 AI 跑起来。</div>
      </div>
      <div class="principle-card" data-index="1">
        <div class="principle-num">02</div>
        <div class="principle-title">从小事开始</div>
        <div class="principle-desc">先解决一个最痛的环节,再扩展到下一个。</div>
      </div>
      <div class="principle-card" data-index="2">
        <div class="principle-num">03</div>
        <div class="principle-title">长期陪跑</div>
        <div class="principle-desc">上线是起点不是终点,持续优化到业务真的变好。</div>
      </div>
      <div class="principle-card" data-index="3">
        <div class="principle-num">04</div>
        <div class="principle-title">拒绝绑架</div>
        <div class="principle-desc">用开放方案,不把你锁死在某家供应商身上。</div>
      </div>
    </div>
  </div>

  <!-- 进度条:只在窄屏显示(CSS 控制) -->
  <div class="principles-progress" id="principlesProgress">
    <div class="progress-segment"></div>
    <div class="progress-segment"></div>
    <div class="progress-segment"></div>
    <div class="progress-segment"></div>
  </div>
</section>





<script src="shared.js"></script>
<script>
  // Scroll reveal
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // 卡片 hover 跟随鼠标位置的光晕
  document.querySelectorAll('.service-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      card.style.setProperty('--mx', `${((e.clientX - rect.left) / rect.width) * 100}%`);
      card.style.setProperty('--my', `${((e.clientY - rect.top) / rect.height) * 100}%`);
    });
  });

  // 视频播放检测
  (function () {
    const video = document.querySelector('.hero-video');
    const hero = document.querySelector('.hero');
    if (!video || !hero) return;
    video.addEventListener('playing', () => { hero.classList.add('has-video'); });
    video.addEventListener('error', () => { hero.classList.remove('has-video'); });
  })();

  // ========== 理念板块：窄屏滑动 + 自动播放 + 进度条 ==========
  (function () {
    const viewport = document.getElementById('principlesViewport');
    const track = document.getElementById('principlesTrack');
    const progress = document.getElementById('principlesProgress');
    if (!viewport || !track || !progress) return;

    const cards = track.querySelectorAll('.principle-card');
    const segments = progress.querySelectorAll('.progress-segment');
    const TOTAL = cards.length;
    const AUTOPLAY_DURATION = 2500;

    let currentIndex = 0;
    let autoplayTimer = null;
    let isNarrowScreen = false;
    let isDragging = false;
    let startX = 0;
    let currentTranslate = 0;
    let resumeTimer = null;

    function checkScreen() {
      isNarrowScreen = window.innerWidth <= 1024;
      if (isNarrowScreen) { startAutoplay(); }
      else { stopAutoplay(); track.style.transform = ''; segments.forEach(s => s.classList.remove('filled', 'active')); }
    }
    function goTo(index, animated = true) {
      if (index < 0) index = 0;
      if (index >= TOTAL) index = TOTAL - 1;
      currentIndex = index;
      const card = cards[0];
      const cardRect = card.getBoundingClientRect();
      const gap = parseFloat(window.getComputedStyle(track).gap) || 0;
      const step = cardRect.width + gap;
      const offset = -index * step;
      track.style.transition = animated ? 'transform 0.6s cubic-bezier(0.65, 0, 0.35, 1)' : 'none';
      track.style.transform = `translateX(${offset}px)`;
      currentTranslate = offset;
      updateProgress();
    }
    function updateProgress() {
      segments.forEach((seg, i) => {
        seg.classList.remove('filled', 'active');
        void seg.offsetWidth;
        if (i < currentIndex) { seg.classList.add('filled'); }
        else if (i === currentIndex) { seg.style.setProperty('--fill-duration', (AUTOPLAY_DURATION / 1000) + 's'); seg.classList.add('active'); }
      });
    }
    function startAutoplay() { stopAutoplay(); goTo(currentIndex); autoplayTimer = setInterval(() => { currentIndex = (currentIndex + 1) % TOTAL; goTo(currentIndex); }, AUTOPLAY_DURATION); }
    function stopAutoplay() { if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; } }
    function onDragStart(e) { if (!isNarrowScreen) return; isDragging = true; stopAutoplay(); if (resumeTimer) clearTimeout(resumeTimer); startX = (e.touches ? e.touches[0].clientX : e.clientX); track.style.transition = 'none'; segments.forEach(s => s.classList.remove('active')); }
    function onDragMove(e) { if (!isDragging) return; const x = (e.touches ? e.touches[0].clientX : e.clientX); track.style.transform = `translateX(${currentTranslate + (x - startX)}px)`; }
    function onDragEnd(e) { if (!isDragging) return; isDragging = false; const x = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX); const diff = x - startX; if (diff < -50 && currentIndex < TOTAL - 1) goTo(currentIndex + 1); else if (diff > 50 && currentIndex > 0) goTo(currentIndex - 1); else goTo(currentIndex); if (isNarrowScreen) startAutoplay(); }

    viewport.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);
    viewport.addEventListener('touchstart', onDragStart, { passive: true });
    viewport.addEventListener('touchmove', onDragMove, { passive: true });
    viewport.addEventListener('touchend', onDragEnd);
    viewport.addEventListener('dragstart', e => e.preventDefault());
    window.addEventListener('resize', () => { checkScreen(); if (isNarrowScreen) goTo(currentIndex, false); });
    checkScreen();
  })();
</script>

</body>
</html>
